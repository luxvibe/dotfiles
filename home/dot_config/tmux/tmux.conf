# tmux 配置 — 精简单文件，无插件依赖

# ── 终端颜色 ─────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides "*:Ss=\E[%p1%d q:Se=\E[2 q"
set -g allow-passthrough on

# ── 基础设置 ─────────────────────────────────────────────────
set -g escape-time 0
set -g extended-keys on
set -g repeat-time 600
set -sg focus-events on
set -g history-limit 50000
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g status-interval 5

# ── Prefix: C-a ──────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Vi 模式 ──────────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi C-v send -X rectangle-toggle

# ── 面板分割（继承当前路径）──────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── 面板导航（vim 风格）──────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── 面板大小调整 ─────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── 窗口切换 ─────────────────────────────────────────────────
bind -n M-Left  previous-window
bind -n M-Right next-window
bind c new-window -c "#{pane_current_path}"

# ── 快速重载 ─────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "reloaded"

# ── 状态栏 ───────────────────────────────────────────────────
# 配色用 ANSI 色名（default/blue/green/brightblack…），跟随终端调色板，
# 换终端主题时自动跟随，无需在此改 hex。
set -g status-style "bg=default,fg=default"
set -g status-left-length 30
set -g status-right-length 60
set -g status-left "#[fg=blue,bold] #S #[default] "
set -g status-right "#[fg=green] %H:%M #[fg=brightblack]│#[fg=default] %d %b "
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=black,bg=blue,bold] #I:#W "
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=blue"
set -g message-style "fg=blue,bg=default"
