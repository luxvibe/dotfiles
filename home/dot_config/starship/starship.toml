"$schema" = 'https://starship.rs/config-schema.json'

scan_timeout = 1000  # msпЉМйїШиЃ§ 30ms еЬ®е§ІзЫЃељХеЃєжШУиґЕжЧґ

# Pure preset вАФ https://starship.rs/presets/pure-preset
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$python\
$character"""

[directory]
style = "blue"

[character]
success_symbol = "[вЭѓ](purple)"
error_symbol = "[вЭѓ](red)"
vimcmd_symbol = "[вЭЃ](green)"

[git_branch]
format = "[$branch]($style)"
style = "bright-black"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = "вАЛ"
untracked = "вАЛ"
modified = "вАЛ"
staged = "вАЛ"
renamed = "вАЛ"
deleted = "вАЛ"
stashed = "вЙ°"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[python]
format = "[$virtualenv]($style) "
style = "bright-black"
detect_extensions = []
detect_files = []
detect_folders = []
