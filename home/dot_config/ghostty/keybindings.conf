# Ghostty Keybindings — ergonomic + tmux
# tmux prefix: C-a (matches ~/.config/tmux/tmux.conf)
# Use Caps Lock as Control (Karabiner) → physical prefix is Caps+a, easy on pinky

# Pass vim navigation keys through to Neovim/tmux (unbind in Ghostty)
keybind = ctrl+h=unbind
keybind = ctrl+j=unbind
keybind = ctrl+k=unbind
keybind = ctrl+l=unbind

# Ergonomic: Cmd+Shift uses thumb — avoids Ctrl+Shift pinky strain
keybind = super+shift+h=resize_split:left,10
keybind = super+shift+j=resize_split:down,10
keybind = super+shift+k=resize_split:up,10
keybind = super+shift+l=resize_split:right,10

keybind = super+shift+q=close_window
keybind = super+shift+s=close_surface
keybind = super+shift+c=copy_to_clipboard
keybind = super+shift+v=paste_from_clipboard

# Tmux splits (C-a + | / -) — Cmd combos, no pinky Ctrl+Shift
keybind = super+shift+backslash=text:\x01|
keybind = super+minus=text:\x01-

# Tmux window switching (Cmd+1-9) — sends C-a + number
keybind = super+one=text:\x011
keybind = super+two=text:\x012
keybind = super+three=text:\x013
keybind = super+four=text:\x014
keybind = super+five=text:\x015
keybind = super+six=text:\x016
keybind = super+seven=text:\x017
keybind = super+eight=text:\x018
keybind = super+nine=text:\x019

# Tmux pane navigation (Cmd+hjkl) — sends C-a + direction
keybind = super+h=text:\x01h
keybind = super+j=text:\x01j
keybind = super+k=text:\x01k
keybind = super+l=text:\x01l

# Tmux new window / reload — Cmd+Shift shortcuts
keybind = super+shift+t=text:\x01c
keybind = super+shift+r=text:\x01r
