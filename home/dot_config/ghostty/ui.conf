# Font — typeface and line spacing
# font-family = Berkeley Mono
font-family = Maple Mono NF CN
font-size = 14
adjust-cell-height = 8%

# Theme — color scheme and display gamut
theme = light:Catppuccin Latte,dark:Catppuccin Mocha
window-colorspace = display-p3

# Window — size, padding, and title bar
window-decoration = true
window-theme = auto
window-save-state = default
window-padding-x = 8
window-padding-y = 8
window-width = 1200
window-height = 800

# Split panes — inactive pane dimming
unfocused-split-opacity = 0.85
